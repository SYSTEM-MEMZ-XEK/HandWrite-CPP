# .github/workflows/build.yml
name: Build HandWrite for Windows, Linux, macOS

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:   # 允许手动触发

jobs:
  build-ubuntu:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgl1-mesa-dev \
            libxcb-xinerama0 \
            libxcb-icccm4 \
            libxcb-image0 \
            libxcb-keysyms1 \
            libxcb-randr0 \
            libxcb-render-util0 \
            libxcb-shape0 \
            libxcb-sync1 \
            libxcb-xfixes0 \
            libxcb-xkb1 \
            libxkbcommon-x11-0 \
            libdbus-1-3 \
            libegl1-mesa

      - name: Install Qt6
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.5.0'
          host: 'linux'
          target: 'desktop'
          arch: 'gcc_64'
          modules: 'qtbase qttools'

      - name: Configure CMake
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --parallel 4

      - name: Prepare deployment
        run: |
          mkdir -p deploy
          cp build/HandWrite deploy/
          chmod +x deploy/HandWrite

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: HandWrite-linux-x64
          path: deploy/

  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Qt6
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.5.0'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_msvc2019_64'
          modules: 'qtbase qttools'

      - name: Configure CMake
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release --parallel 4

      - name: Deploy with windeployqt
        run: |
          mkdir deploy
          windeployqt --release --no-compiler-runtime --dir deploy build/Release/HandWrite.exe
          copy build\Release\HandWrite.exe deploy\

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: HandWrite-windows-x64
          path: deploy/

  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Qt6
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.5.0'
          host: 'mac'
          target: 'desktop'
          arch: 'clang_64'
          modules: 'qtbase qttools'

      - name: Configure CMake
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --parallel 4

      - name: Deploy with macdeployqt
        run: |
          macdeployqt build/HandWrite.app -verbose=2 -always-overwrite
          cp -r build/HandWrite.app build/HandWrite.app/Contents/MacOS/HandWrite .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: HandWrite-macos-x64
          path: |
            build/HandWrite.app
            build/HandWrite
