# .github/workflows/build.yml
name: Build HandWrite for Windows, Linux, macOS

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-ubuntu:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 安装必要的系统库（去除不存在的 libegl1-mesa）
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgl1-mesa-dev \
            libxcb-xinerama0 \
            libxcb-icccm4 \
            libxcb-image0 \
            libxcb-keysyms1 \
            libxcb-randr0 \
            libxcb-render-util0 \
            libxcb-shape0 \
            libxcb-sync1 \
            libxcb-xfixes0 \
            libxcb-xkb1 \
            libxkbcommon-x11-0 \
            libdbus-1-3

      - name: Install Qt6
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.5.0'
          host: 'linux'
          target: 'desktop'
          arch: 'gcc_64'
          modules: 'qtbase qttools'

      - name: Configure CMake
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --parallel 4

      - name: Prepare artifact
        run: |
          mkdir -p deploy
          cp build/HandWrite deploy/
          chmod +x deploy/HandWrite

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: HandWrite-linux-x64
          path: deploy/

  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 使用 vcpkg 安装 Qt6（包含 base 和 tools）
      - name: Install Qt6 via vcpkg
        run: |
          vcpkg install qt6-base qt6-tools --triplet x64-windows
          echo "CMAKE_PREFIX_PATH=C:\vcpkg\installed\x64-windows" >> $env:GITHUB_ENV

      - name: Configure CMake
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release --parallel 4

      - name: Deploy with windeployqt
        run: |
          mkdir deploy
          # 从 vcpkg 安装目录找到 windeployqt
          $WINDEPLOYQT = "C:\vcpkg\installed\x64-windows\tools\qt6\windeployqt.exe"
          & $WINDEPLOYQT --release --no-compiler-runtime --dir deploy build\Release\HandWrite.exe
          copy build\Release\HandWrite.exe deploy\

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: HandWrite-windows-x64
          path: deploy/

  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 使用 Homebrew 安装 Qt6
      - name: Install Qt6 via Homebrew
        run: |
          brew install qt@6
          echo "CMAKE_PREFIX_PATH=$(brew --prefix qt@6)" >> $GITHUB_ENV

      - name: Configure CMake
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --parallel 4

      - name: Deploy with macdeployqt
        run: |
          # 从 Homebrew 安装目录找到 macdeployqt
          MACDEPLOYQT=$(brew --prefix qt@6)/bin/macdeployqt
          $MACDEPLOYQT build/HandWrite.app -verbose=2 -always-overwrite
          mkdir -p deploy
          cp -r build/HandWrite.app deploy/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: HandWrite-macos-x64
          path: deploy/
