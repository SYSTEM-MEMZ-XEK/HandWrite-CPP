name: Build Multi-Platform

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Install Qt
      uses: jurplel/install-qt-action@v4
      with:
        version: '6.6.0'
        host: 'windows'
        target: 'desktop'
        arch: 'mingw_64'
        modules: 'qtconcurrent qtprintsupport'
    
    - name: Configure
      run: |
        mkdir build
        cd build
        cmake .. -G "MinGW Makefiles" -DCMAKE_BUILD_TYPE=Release
    
    - name: Build
      run: |
        cd build
        mingw32-make -j4
    
    - name: Deploy
      run: |
        cd build
        windeployqt --release HandWrite.exe
      continue-on-error: true
    
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: HandWrite-Windows
        path: build/

  build-linux:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Install Qt
      uses: jurplel/install-qt-action@v4
      with:
        version: '6.6.0'
        host: 'linux'
        target: 'desktop'
        modules: 'qtconcurrent qtprintsupport'
    
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libgl1-mesa-dev libxkbcommon-x11-0 libxcb-icccm4 libxcb-image0 libxcb-keysyms1 libxcb-randr0 libxcb-render-util0 libxcb-shape0
    
    - name: Configure
      run: |
        mkdir build
        cd build
        cmake .. -DCMAKE_BUILD_TYPE=Release
    
    - name: Build
      run: |
        cd build
        make -j$(nproc)
    
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: HandWrite-Linux
        path: build/HandWrite

  build-macos:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Install Qt
      uses: jurplel/install-qt-action@v4
      with:
        version: '6.6.0'
        host: 'mac'
        target: 'desktop'
        modules: 'qtconcurrent qtprintsupport'
    
    - name: Configure
      run: |
        mkdir build
        cd build
        cmake .. -DCMAKE_BUILD_TYPE=Release
    
    - name: Build
      run: |
        cd build
        make -j$(sysctl -n hw.ncpu)
    
    - name: Deploy
      run: |
        cd build
        macdeployqt HandWrite.app -dmg
      continue-on-error: true
    
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: HandWrite-macOS
        path: build/

  release:
    needs: [build-windows, build-linux, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
    - name: Download Windows
      uses: actions/download-artifact@v4
      with:
        name: HandWrite-Windows
        path: windows
    
    - name: Download Linux
      uses: actions/download-artifact@v4
      with:
        name: HandWrite-Linux
        path: linux
    
    - name: Download macOS
      uses: actions/download-artifact@v4
      with:
        name: HandWrite-macOS
        path: macos
    
    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          windows/HandWrite.exe
          linux/HandWrite
          macos/HandWrite.dmg
